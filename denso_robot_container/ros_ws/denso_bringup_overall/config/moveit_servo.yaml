servo_node:
  ros__parameters:
    use_sim_time: true

    moveit_servo:
      move_group_name: "arm"
      planning_frame: "base_link"
      robot_link_command_frame: "base_link"

      ee_frame_name: "J6"

      # =======================
      # 输入：TwistStamped（速度单位）
      # =======================
      command_in_type: "speed_units"
      cartesian_command_in_topic: "/servo_node/delta_twist_cmds"
      joint_command_in_topic: "/servo_node/delta_joint_cmds"
      incoming_command_timeout: 0.1

      # =======================
      # 输出：对接 ros2_control JointTrajectoryController（已确认 topic 存在）
      # =======================
      command_out_topic: "/denso_joint_trajectory_controller/joint_trajectory"
      publish_period: 0.01  # 100 Hz

      # joint states topic
      joint_topic: "/joint_states"

      # =======================
      # 限速：先保守，跑通后再放开
      # =======================
      linear_scale: 0.03       # m/s   (先小一点，避免仿真里突然很猛)
      rotational_scale: 0.3    # rad/s
      joint_scale: 0.5         # rad/s

      # =======================
      # 停止行为：停止时发几帧 halt
      # =======================
      num_outgoing_halt_msgs_to_publish: 4

      # =======================
      # 保护项（建议保留）
      # =======================
      joint_limit_margin: 0.1
      lower_singularity_threshold: 17.0
      hard_stop_singularity_threshold: 90.0
      leaving_singularity_threshold_multiplier: 1.2

      # =======================
      # 碰撞：仿真先关（现在环境干净、目标是速度/确定性）
      # 之后需要时再打开并调低 collision_check_rate
      # =======================
      check_collisions: false
      collision_check_rate: 20.0
      self_collision_proximity_threshold: 0.01
      scene_collision_proximity_threshold: 0.02

      # =======================
      # 显式关节名（与你 joint_states 对齐）
      # =======================
      joint_names:
        - "joint_1"
        - "joint_2"
        - "joint_3"
        - "joint_4"
        - "joint_5"
        - "joint_6"

